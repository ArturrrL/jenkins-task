jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "1234"
        - id: "developer"
          password: "4321"
  authorizationStrategy:
    projectMatrix:
      permissions:
        - "Overall/Administer:admin"
        - "Overall/Read:developer"
        - "Job/Read:developer"
        - "Job/Build:developer"
        - "Job/Workspace:developer"
                
unclassified:
  location:
    url: "http://localhost:8088/"